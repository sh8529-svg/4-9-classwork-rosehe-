<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Drawing Story Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Draw Something ✏️</h1>

  <canvas id="canvas"></canvas>

  <div class="controls">
    <button id="clear">Clear</button>
    <button id="analyze">Finish Drawing</button>
  </div>

  <div id="output">
    <h2>AI Response:</h2>
    <p id="responseText">Draw something and click "Finish Drawing"</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
